<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 12px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,.35);
    }
    .icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    canvas {
      width: 96px;
      height: 96px;
    }
    .next {
      text-align: center;
    }

    .next-name {
      font-size: 14px;
      opacity: 0.8;
    }

    .next-time {
      font-size: 28px;
      font-weight: 600;
      margin: 2px 0;
    }

    .remaining {
      font-size: 13px;
      color: #38bdf8;
    }

    select, button {
      width: 100%;
      margin-top: 6px;
      padding: 6px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
    }

    select {
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #1e293b;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <canvas id="icon" width="96" height="96"></canvas>
    </div>

    <div class="next">
      <div class="next-name" id="next-name"></div>
      <div class="next-time" id="next-time"></div>
      <div class="remaining" id="remaining"></div>
    </div>
  </div>
  <div class="card">
    <select id="country"></select>
    <select id="region"></select>
    <select id="city"></select>
    <button id="save">Kaydet</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
