<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light; --page: #eef4fb; --ink: #172554; --muted: #475569; --card: #ffffff; --line: #d8e2ee; --secondary: #edf2f7; --shadow: rgba(30,64,175,.12); --select: #f8fafc; --ring-track: #dbe5ef; --dial: #f8fbff; }
    @media (prefers-color-scheme: dark) { :root { color-scheme: dark; --page: #071426; --ink: #eef2ff; --muted: #b6c3df; --card: #0f1e32; --line: #26384f; --secondary: #1a2b40; --shadow: rgba(0,0,0,.38); --select: #102238; --ring-track: #2a3c52; --dial: #0a1728; } }
    * { box-sizing: border-box; }
    html { background: var(--page); } body { width: 280px; min-height: 360px; margin: 0; padding: 12px; overflow-x: hidden; font-family: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); background: var(--page); }
    .card { position: relative; overflow: hidden; margin-bottom: 10px; padding: 14px; border: 1px solid var(--line); border-radius: 22px; background: var(--card); box-shadow: 0 12px 28px var(--shadow); }
    .hero { padding-top: 10px; text-align: center; }.hero::after { content: ""; position: absolute; width: 150px; height: 75px; top: -62px; left: 50%; transform: translateX(-50%); border-radius: 50%; background: rgba(125,211,252,.3); filter: blur(18px); }
    .toolbar { display: flex; justify-content: flex-end; min-height: 26px; position: relative; z-index: 1; }
    .icon-wrap { position: relative; z-index: 1; display: flex; justify-content: center; margin: 2px 0 10px; }
    canvas { position: relative; width: 112px; height: 112px; }
    .next { position: relative; z-index: 1; }.next-name { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .02em; }.next-time { margin: 2px 0 4px; font-size: 31px; font-weight: 760; letter-spacing: -.045em; }.remaining { display: inline-flex; padding: 4px 9px; border: 1px solid rgba(56,189,248,.28); border-radius: 99px; background: rgba(56,189,248,.13); color: #0284c7; font-size: 12px; font-weight: 700; }
    select, button { width: 100%; margin-top: 8px; border: 1px solid transparent; border-radius: 13px; padding: 9px 10px; font: inherit; font-size: 12px; font-weight: 700; transition: transform .16s ease, background .16s ease, box-shadow .16s ease; }
    select { appearance: auto; color: var(--ink); background: var(--select); border-color: var(--line); outline: none; } select:focus { border-color: rgba(56,189,248,.8); box-shadow: 0 0 0 3px rgba(56,189,248,.18); }
    button { color: #042f4b; cursor: pointer; background: linear-gradient(135deg, #7dd3fc, #38bdf8); box-shadow: 0 7px 14px rgba(14,165,233,.2); } button:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(14,165,233,.3); } button:active { transform: translateY(0); }
    button.secondary { color: var(--ink); background: var(--secondary); border-color: var(--line); box-shadow: none; }.toolbar button { width: auto; margin: 0; padding: 5px 9px; border-radius: 99px; font-size: 11px; }.hidden { display: none; }
    #toggle-times { margin-top: 14px; } table { width: 100%; margin-top: 10px; border-collapse: separate; border-spacing: 0 4px; font-size: 12px; } th { padding: 0 7px 4px; color: var(--muted); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; text-align: left; } td { padding: 8px 7px; background: rgba(255,255,255,.14); } td:first-child { border-radius: 9px 0 0 9px; } td:last-child { border-radius: 0 9px 9px 0; text-align: right; font-variant-numeric: tabular-nums; } th:last-child { text-align: right; } tr.next-prayer td { color: #0369a1; background: rgba(56,189,248,.2); font-weight: 800; }
    .location-card { padding: 10px 14px 14px; }
    .privacy { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 10px; color: var(--muted); font-size: 10px; line-height: 1.45; }.privacy summary { cursor: pointer; color: var(--ink); font-size: 11px; font-weight: 700; }.privacy p { margin: 7px 0 0; }
  </style>
</head>
<body>
  <div class="card hero">
    <div class="toolbar"><button id="language-toggle" class="secondary"></button></div>
    <div class="icon-wrap"><canvas id="icon" width="112" height="112"></canvas></div>
    <div class="next"><div class="next-name" id="next-name"></div><div class="next-time" id="next-time"></div><div class="remaining" id="remaining"></div></div>
    <button id="toggle-times" class="secondary" data-i18n="showAllTimes"></button>
    <table id="times-table" class="hidden"><thead><tr><th data-i18n="prayerColumn"></th><th data-i18n="timeColumn"></th></tr></thead><tbody></tbody></table>
  </div>
  <div class="card location-card">
    <button id="change-location" class="secondary hidden" data-i18n="changeLocation"></button>
    <div id="location-fields"><select id="country"></select><select id="region"></select><select id="city"></select><button id="save" data-i18n="save"></button></div>
    <details class="privacy"><summary data-i18n="privacyTitle"></summary><p id="privacy-text"></p></details>
  </div>
  <script src="i18n.js"></script><script src="popup.js"></script>
</body>
</html>
